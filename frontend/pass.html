<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security</title>
    <link rel="stylesheet" href="../css/page.css">
    <link rel="stylesheet" href="../css/csannerButton.css">
    <link rel="stylesheet" href="../css/securityPage.css">
    <link rel="shortcut icon" href="../icons/security.ico" type="image/x-icon">
</head>

<body>
    <div class="page-layout" id="page-layout">
        <div class="main-container" id="main-container">
            <div class="header-container" id="header-container">
                <img src="../icons/guap-sign_b 1.svg" alt="SUAI">
                <div class="header-name" id="header-name">Контроль пропусков</div>
            </div>
            <div class="filter-container" id="filter-container">Фильтры
                <!-- элементы filter-container -->
            </div>
            <div class="scanner-container" id="scanner-container">
                <div class="scanner-container-text">Начать Сканирование</div>
                <div class="scanner-button" id="scanner-button">
                    <img src="../icons/qr-code.png" alt="QR-code scanner" class="scanner-icon">
                </div>
            </div>
            <div class="logs-container" id="logs-container">
                <div class="logs-container-inscription" id="logs-container-inscription">
                    <div class="logs-container-text" id="logs-container-text">Вход/Выход</div>
                    <hr class="divider">
                </div>
                <div class="logs-info" id="logs-info">Логи
                    <!-- <ul class="logs" id="logs"></ul> -->
                </div>
            </div>
        </div>
    </div>
    <script src="../js/scanner_1pg.js"></script>
</body>

</html>
