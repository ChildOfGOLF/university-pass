<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>СУАЙ КУАР</title>
    <link rel="stylesheet" href="./styles/fonts/fonts.css" />
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/animations.css" />
    <link rel="icon" href="" size="any" />
    <link rel="icon" href="" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="" />
  </head>
  <body class="admin-page page">
    <section id="login-section">
      <form id="admin-login-form" class="login-form">
        <div class="form-input">
          <label for="admin-email" class="form-label normal-text">почта</label>
          <input type="email" class="email" id="admin-email" />
        </div>
        <div class="form-input">
          <label for="admin-password" class="form-label normal-text"
            >пароль</label
          >
          <input type="password" class="password" id="admin-password" />
        </div>
        <p class="error-message" id="admin-error"></p>
        <button
          type="submit"
          class="submit-button big-text"
          id="admin-submit-button"
        >
          войти
        </button>
      </form>
    </section>

    <section class="visually-hidden" id="admin-panel">
      <div class="admin-container">
        <div class="tabs">
          <button
            class="tab-button admin-button active"
            id="tab-users"
            data-tab="users"
          >
            пользователи
          </button>
          <button
            class="tab-button admin-button"
            id="tab-guest"
            data-tab="guests"
          >
            гости
          </button>
        </div>

        <div id="users-tab" class="tab-content">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <td>id</td>
                  <td>фио</td>
                  <td>email</td>
                  <td>создан</td>
                  <td>статус</td>
                  <td>роль</td>
                  <td></td>
                </tr>
              </thead>
              <tbody id="users-table-body">
                <tr colspan="7">
                  <td>Загрузка</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div id="guests-tab" class="tab-content visually-hidden">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <td>id</td>
                  <td>фио</td>
                  <td>создан</td>
                  <td>годен до</td>
                  <td>цель</td>
                  <td>вход</td>
                  <td>использован</td>
                  <td></td>
                </tr>
              </thead>
              <tbody id="guests-table-body">
                <tr colspan="8">
                  <td>Загрузка</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="actions-buttons">
          <button class="action-button admin-button" id="create-user-button">
            создать пользователя
          </button>
          <button class="action-button admin-button" id="logout-admin">
            выйти
          </button>
        </div>
      </div>
    </section>
    <script type="module" src="./js/admin.js"></script>
  </body>
</html>
