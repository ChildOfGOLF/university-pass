<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>СУАЙ КУАР</title>
    <link rel="stylesheet" href="./styles/fonts/fonts.css" />
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/animations.css" />
    <link rel="icon" href="" size="any" />
    <link rel="icon" href="" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="" />
  </head>
  <body class="admin-page page">
    <section id="login-section">
      <form id="admin-login-form" class="login-form">
        <div class="form-input">
          <label for="admin-email" class="form-label normal-text">почта</label>
          <input type="email" class="email" id="admin-email" />
        </div>
        <div class="form-input">
          <label for="admin-password" class="form-label normal-text"
            >пароль</label
          >
          <input type="password" class="password" id="admin-password" />
        </div>
        <p class="error-message" id="admin-error"></p>
        <button
          type="submit"
          class="submit-button big-text"
          id="admin-submit-button"
        >
          войти
        </button>
      </form>
    </section>

    <section class="visually-hidden" id="admin-panel">
      <div class="admin-container">
        <div class="tabs">
          <button
            class="tab-button admin-button active"
            id="tab-users"
            data-tab="users"
          >
            пользователи
          </button>
          <button
            class="tab-button admin-button"
            id="tab-guest"
            data-tab="guests"
          >
            гости
          </button>
        </div>

        <div id="users-tab" class="tab-content">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <td>id</td>
                  <td>фио</td>
                  <td>email</td>
                  <td>создан</td>
                  <td>статус</td>
                  <td>роль</td>
                  <td></td>
                </tr>
              </thead>
              <tbody id="users-table-body">
                <tr>
                  <td colspan="7">Загрузка</td>
                </tr>
              </tbody>
            </table>
          </div>
          <button
            class="action-button admin-button"
            id="create-user-button"
            popovertarget="modal-create-user"
          >
            создать пользователя
          </button>
          <button
            class="action-button admin-button"
            id="update-user-button"
            popovertarget="modal-update-user"
          >
            обновить пользователя
          </button>
        </div>

        <div id="guests-tab" class="tab-content visually-hidden">
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <td>id</td>
                  <td>фио</td>
                  <td>создан</td>
                  <td>годен до</td>
                  <td>цель</td>
                  <td>вход</td>
                  <td>использован</td>
                  <td></td>
                </tr>
              </thead>
              <tbody id="guests-table-body">
                <tr>
                  <td colspan="8">Загрузка</td>
                </tr>
              </tbody>
            </table>
          </div>
          <button
            class="action-button admin-button"
            id="create-guest-button"
            popovertarget="modal-create-guest"
          >
            создать гостя
          </button>
        </div>

        <div class="actions-buttons">
          <button class="action-button admin-button" id="logout-admin">
            выйти
          </button>
        </div>

        <div id="modal-create-user" popover="manual">
          <button popovertargetaction="hide" popovertarget="modal-create-user">
            закрыть окно
          </button>
          <form id="form-create-user">
            <div class="form-input">
              <label for="user-second_name" class="form-label">фамилия</label>
              <input type="text" id="user-second_name" required />
            </div>
            <div class="form-input">
              <label for="user-first_name" class="form-label">имя</label>
              <input type="text" id="user-first_name" required />
            </div>
            <div class="form-input">
              <label for="user-patronymic" class="form-label">отчество</label>
              <input type="text" id="user-patronymic" required />
            </div>
            <div class="form-input">
              <label for="user-email" class="form-label">почта</label>
              <input type="email" id="user-email" required />
            </div>
            <div class="form-input">
              <label for="user-password" class="form-label">пароль</label>
              <input type="text" id="user-password" required />
            </div>
            <div class="form-input">
              <label for="user-phone" class="form-label">номер телефона</label>
              <input type="text" id="user-phone" required />
            </div>
            <div class="form-input">
              <label for="user-role" class="form-label">роль</label>
              <input type="text" id="user-role" required />
            </div>
            <button class="submit-button big-text" type="submit">
              создать
            </button>
          </form>
        </div>

        <div id="modal-create-guest" popover="manual">
          <button popovertargetaction="hide" popovertarget="modal-create-guest">
            закрыть окно
          </button>
          <form id="form-create-guest">
            <div class="form-input">
              <label for="guest-second_name" class="form-label">фамилия</label>
              <input type="text" id="guest-second_name" required />
            </div>
            <div class="form-input">
              <label for="guest-first_name" class="form-label">имя</label>
              <input type="text" id="guest-first_name" required />
            </div>
            <div class="form-input">
              <label for="guest-patronymic" class="form-label">отчество</label>
              <input type="text" id="guest-patronymic" required />
            </div>
            <div class="form-input">
              <label for="guest-purpose" class="form-label">цель</label>
              <input type="text" id="guest-purpose" required />
            </div>
            <div class="form-input">
              <label for="guest-valid_from" class="form-label"
                >действителен с</label
              >
              <input type="date" id="guest-valid_from" required />
            </div>
            <div class="form-input">
              <label for="guest-valid_to" class="form-label"
                >действителен до</label
              >
              <input type="date" id="guest-valid_to" required />
            </div>

            <button class="submit-button big-text" type="submit">
              создать
            </button>
          </form>
        </div>
      </div>
    </section>
    <script type="module" src="./js/admin.js"></script>
  </body>
</html>
