<!doctype html>
<html>
  <head>
    <meta charset="UTF8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>СУАЙ КУАР</title>
    <link rel="stylesheet" href="./styles/fonts/fonts.css" />
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/animations.css" />
    <link rel="icon" href="" size="any" />
    <link rel="icon" href="" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="" />
  </head>
  <body class="page">
    <form class="login-form" id="login-form">
      <div class="form-heading">
        <img src="./styles/svg/guap-logo.svg" class="form-heading__image" />
        <p class="form-heading__text big-text">электронный пропуск</p>
      </div>
      <div id="pass-content" class="pass-content" hidden>
        <canvas id="qr-canvas" class="qr-canvas"> </canvas>
        <p class="timer-text normal-text" id="timer-text">
          новый куаркодик через <span id="timer">30</span> сек.
        </p>
      </div>
      <button type="button" class="submit-button big-text" id="logout-button">
        выйти
      </button>
      <div
        class="error-message pass-error"
        id="pass-error"
        aria-live="polite"
      ></div>
    </form>
    <script type="module" src="./js/pass.js"></script>
  </body>
</html>
